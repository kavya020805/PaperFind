services:
  - type: web
    name: paperfind-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperfind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: paperfind-redis
          property: connectionString
      - key: HUGGINGFACE_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true

  - type: redis
    name: paperfind-redis
    ipAllowList: [] # only allow internal connections

databases:
  - name: paperfind-db
    plan: free # Change if needed
    databaseName: paperfind
    user: paperfind_user
